name: Build and Release Android APK

on:
  push:
    branches:
      - master
      - main

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    # Prevent infinite loop from automated version bump commits
    if: "!contains(github.event.head_commit.message, '[skip ci]')"

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          
      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'
          
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          
      - name: Bump Application Version
        run: |
          CURRENT_VERSION=$(grep "^version: " pubspec.yaml | sed 's/version: //')
          BASE_VERSION=$(echo $CURRENT_VERSION | cut -d+ -f1)
          BUILD_NUMBER=$(echo $CURRENT_VERSION | cut -d+ -f2)
          
          MAJOR=$(echo $BASE_VERSION | cut -d. -f1)
          MINOR=$(echo $BASE_VERSION | cut -d. -f2)
          PATCH=$(echo $BASE_VERSION | cut -d. -f3)
          
          # Increment patch and build number
          NEW_PATCH=$((PATCH + 1))
          NEW_BUILD=$((BUILD_NUMBER + 1))
          NEW_VERSION="${MAJOR}.${MINOR}.${NEW_PATCH}+${NEW_BUILD}"
          
          echo "Bumping version from $CURRENT_VERSION to $NEW_VERSION"
          
          # Overwrite pubspec.yaml version
          sed -i "s/^version: .*/version: ${NEW_VERSION}/" pubspec.yaml
          
          # Save for subsequent steps
          echo "NEW_VERSION=${NEW_VERSION}" >> $GITHUB_ENV
          
          # Generate the OTA Update target chunk for the Flutter networking API
          echo "{\"version\": \"${NEW_VERSION}\", \"changelog\": \"Update to version ${NEW_VERSION}. General bug fixes and performance improvements.\", \"downloadUrl\": \"https://github.com/${{ github.repository }}/releases/download/v${NEW_VERSION}/app-release.apk\"}" > app_version.json

      - name: Install dependencies
        run: flutter pub get
        
      - name: Build APK (Release mode)
        run: flutter build apk --release
        
      - name: Update README.md Download Link
        run: |
          DOWNLOAD_URL="https://github.com/${{ github.repository }}/releases/download/v${NEW_VERSION}/app-release.apk"
          BADGE_MARKDOWN="[![Download Latest APK](https://img.shields.io/badge/Download_APK_v${NEW_VERSION}-FCC624?style=for-the-badge\&logo=android\&logoColor=black)](${DOWNLOAD_URL})"
          
          # Replace content specifically between invisible HTML tags
          sed -i "/<!-- LATEST_RELEASE_START -->/,/<!-- LATEST_RELEASE_END -->/c\<!-- LATEST_RELEASE_START -->\n\n${BADGE_MARKDOWN}\n\n<!-- LATEST_RELEASE_END -->" README.md

      - name: Commit and Push Changes
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add pubspec.yaml README.md app_version.json
          
          # The [skip ci] flag tells GitHub not to trigger another workflow from this automated push!
          git commit -m "chore: release v${NEW_VERSION} [skip ci]"
          git push
          
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ env.NEW_VERSION }}
          name: Release v${{ env.NEW_VERSION }}
          # Path to output APK generated by flutter build apk
          files: build/app/outputs/flutter-apk/app-release.apk
          draft: false
          prerelease: false
          generate_release_notes: true
